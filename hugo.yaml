baseURL: https://rupalimo.github.io/papemod-01/
locale: en-us
title: Chantal Partamian
theme: PaperMod

params:
  subtitle: "Filmmaker & Archivist"
  hideMeta: true
  hideSummary: true
  disableThemeToggle: true
  showPostNavLinks: true
  defaultTheme: light

caches:
  images:
    dir: :cacheDir/images

menus:
  header:
    - name: About
      pageRef: /about
      weight: 10    
    - name: Press
      pageRef: /press
      weight: 30
    - name: Publications
      pageRef: /publications
      weight: 20
    - name: KATSAKH Archives
      pageRef: /katsakh
      weight: 40

markup:
  goldmark:
    renderHooks:
      image:
        useEmbedded: always
      link:
        useEmbedded: always
module:
  mounts:
    - source: assets
      target: assets
    - source: static
      target: assets
