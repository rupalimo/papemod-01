<div class="project__menu">
	{{/*
	<p class="_label">Projects</p>
	*/}}

<menu>
  {{ $current := . }}
  {{ range where .Site.RegularPages.ByDate.Reverse "Type" "projects" }}
    <li class="project--item{{ if eq . $current }} active{{ end }}">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
  {{ end }}
</menu>
</div>
